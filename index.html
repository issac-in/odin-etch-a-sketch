<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etch a Sketch</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./logic.js" defer></script>
</head>

<body>
  <header>
    <div class="logo-container">
      <img src="./assets/logo.svg" alt="etch a sketch logo" class="logo-img">
      <!-- We might need an h1 for accessibility -->
    </div>
    <nav>
      <ul>
        <li>
          <span class="tool-bar-choice">
            <img src="./assets/stylus-default.svg" alt="selected stylus" class="tool-bar-img">
            <img src="./assets/icons8-chevron-down.svg" alt="view stylus options" class="chevron" id="stylus-options">
          </span>
        </li>
        <li>
          <img src="./assets/eraser.svg" alt="eraser tool" class="tool-bar-img tool-bar-choice">
        </li>
        <li>
          <img src="./assets/background-fill.svg" alt="select background color" class="tool-bar-img tool-bar-choice">
        </li>
        <li>
          <span class="tool-bar-choice">
            <img src="./assets/canvas-gridlines-on.svg" alt="toggle canvas gridlines" class="tool-bar-img">
            <img src="./assets/icons8-chevron-right.svg" alt="adjust canvas size" class="chevron" id="canvas-options">
          </span>
        </li>
      </ul>
      <img src="./assets/delete-sketch.svg" alt="delete sketch" class="tool-bar-img tool-bar-choice">
    </nav>
  </header>
  <div class="grid" id="grid" data-cy="grid"></div>
</body>

</html>
